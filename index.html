<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fraccionador de años</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="logo.png" type="image/png">
    <link rel="apple-touch-icon" href="logo.png">
    <meta name="theme-color" content="#4f46e5">
    <meta name="apple-mobile-web-app-capable" content="yes">
</head>
<body>
    <div class="glass-container">
        <header>
            <h1>Fraccionador de años</h1>
        </header>

        <section class="input-section">
            <div class="input-card">
                <label>Años</label>
                <input type="number" id="inputAnos" placeholder="0" min="0">
            </div>
            <div class="input-card">
                <label>Meses</label>
                <input type="number" id="inputMeses" placeholder="0" min="0" max="12">
            </div>
            <div class="input-card">
                <label>Días</label>
                <input type="number" id="inputDias" placeholder="0" min="0" max="31">
            </div>
        </section>

        <section class="controls">
            <p class="section-title">Disminuir</p>
            <div class="btn-grid">
                <button onclick="calcular('div', 2)">1/2</button>
                <button onclick="calcular('div', 3)">1/3</button>
                <button onclick="calcular('div', 4)">1/4</button>
                <button onclick="calcular('div', 6)">1/6</button>
                <button onclick="calcular('div', 7)">1/7</button>
            </div>

            <p class="section-title">Aumentar</p>
            <div class="btn-grid">
                <button class="btn-alt" onclick="calcular('mul', 1.5)">1/2</button>
                <button class="btn-alt" onclick="calcular('mul', 1.333)">1/3</button>
                <button class="btn-alt" onclick="calcular('mul', 2)">Doble</button>
            </div>
        </section>

        <div id="resultWrapper" class="result-wrapper hidden">
            <div class="result-box">
                <small>Variación:</small>
                <p id="variacionText"></p>
                <hr>
                <small>Resultado Final:</small>
                <h2 id="finalText"></h2>
            </div>
            <div class="action-bar">
                <button class="btn-action copy" onclick="copy()">Copiar</button>
                <button class="btn-action wa" onclick="share()">WhatsApp</button>
            </div>
            <button class="btn-reset" onclick="resetAll()">Nuevo Cálculo</button>
        </div>

        <footer onclick="easterEgg()">
            <p>© Víctor Siu</p>
        </footer>
    </div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
