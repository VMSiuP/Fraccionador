<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calculadora de Tiempo - Víctor Siu</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="logo.png" type="image/png">
    <link rel="apple-touch-icon" href="logo.png">
    <meta name="theme-color" content="#1a56db">
    <meta name="apple-mobile-web-app-capable" content="yes">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Fraccionador Temporal</h1>
            <p class="subtitle">Año Natural (365 días)</p>
        </header>

        <section class="inputs">
            <div class="input-box">
                <label>Días</label>
                <input type="number" id="inputDias" value="0" min="0">
            </div>
            <div class="input-box">
                <label>Meses</label>
                <input type="number" id="inputMeses" value="0" min="0">
            </div>
            <div class="input-box">
                <label>Años</label>
                <input type="number" id="inputAnos" value="0" min="0">
            </div>
        </section>

        <section class="controls">
            <div class="group">
                <h3>Disminuir</h3>
                <div class="grid">
                    <button onclick="procesar('div', 2)">1/2</button>
                    <button onclick="procesar('div', 3)">1/3</button>
                    <button onclick="procesar('div', 4)">1/4</button>
                    <button onclick="procesar('div', 6)">1/6</button>
                    <button onclick="procesar('div', 7)">1/7</button>
                </div>
            </div>

            <div class="group">
                <h3>Aumentar</h3>
                <div class="grid">
                    <button onclick="procesar('mul', 1.5)">1/2</button>
                    <button onclick="procesar('mul', 1.3333)">1/3</button>
                    <button onclick="procesar('mul', 2)">Doble</button>
                </div>
            </div>
        </section>

        <div id="resultArea" class="result-area hidden">
            <div class="result-content">
                <small>Resultado (D, M, A):</small>
                <h2 id="resText"></h2>
            </div>
            <div class="share-bar">
                <button class="btn-copy" onclick="copyRes()">Copiar</button>
                <button class="btn-wa" onclick="shareWA()">WhatsApp</button>
            </div>
        </div>

        <footer onclick="easterEgg()">
            <p>© 2026 Víctor Siu</p>
        </footer>
    </div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
